<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: rgb(22, 6, 37); /* black background */
      color: #fff; /* white text */
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .product-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .product-card {
      background: #111; /* dark card background */
      border-radius: 10px;
      overflow: hidden;
      width: 250px;
      box-shadow: 0 4px 10px rgba(255,255,255,0.1);
      transition: transform 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-info {
      padding: 15px;
      text-align: center;
    }

    .product-info h3 {
      margin: 10px 0 5px;
      font-size: 18px;
      color: #fff;
    }

    .product-info p {
      color: #ccc;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .product-card {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h2>Our Products</h2>

<div class="product-gallery">
  <div class="product-card">
    <img src="images/large.jpeg" alt="Product 1">
    <div class="product-info">
      <h3>SketchPad Mini</h3>
      <p>Compact and portable</p>
    </div>
  </div>

  <div class="product-card">
    <img src="images/light.jpeg" alt="Product 2">
    <div class="product-info">
      <h3>SketchPad Pro</h3>
      <p>Advanced features</p>
    </div>
  </div>

  <div class="product-card">
    <img src="images/med.jpeg" alt="Product 3">
    <div class="product-info">
      <h3>SketchPad Lite</h3>
      <p>Affordable and simple</p>
    </div>
  </div>
</div>

</body>
</html>
