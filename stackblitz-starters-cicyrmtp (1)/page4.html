      <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product, .cart {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      max-width: 100%;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input[type="number"] {
      width: 60px;
      padding: 5px;
      margin-bottom: 10px;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #218838;
    }

    .checkout {
      background: #007bff;
    }

    .checkout:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<header>
  <h1>Order</h1>
</header>

<div class="container">

  <!-- Products -->
  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Drawlite pad mini</h3>
    <p class="price">$100</p>
    <input type="number" min="1" value="1" id="qty1">
    <br>
    <button onclick="addToCart('Product 1', 10, 'qty1')">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Drawlite pad lite</h3>
    <p class="price">$250</p>
    <input type="number" min="1" value="1" id="qty2">
    <br>
    <button onclick="addToCart('Product 2', 15, 'qty2')">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Drawlite pad pro</h3>
    <p class="price">$500</p>
    <input type="number" min="1" value="1" id="qty3">
    <br>
    <button onclick="addToCart('Product 3', 20, 'qty3')">Add to Cart</button>
  </div>

  <!-- Cart Section -->
  <div class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cartItems"></ul>
    <p><strong>Total: $<span id="total">0</span></strong></p>
    <button class="checkout" onclick="checkout()">Checkout</button>
  </div>

</div>

<script>
  let cart = [];
  let total = 0;

  function addToCart(name, price, qtyId) {
    let qty = parseInt(document.getElementById(qtyId).value);

    cart.push({ name, price, qty });
    total += price * qty;

    updateCart();
  }

  function updateCart() {
    let cartList = document.getElementById("cartItems");
    let totalDisplay = document.getElementById("total");

    cartList.innerHTML = "";

    cart.forEach(item => {
      let li = document.createElement("li");
      li.textContent = `${item.name} x${item.qty} = $${item.price * item.qty}`;
      cartList.appendChild(li);
    });

    totalDisplay.textContent = total;
  }

  function checkout() {
    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

    alert("Checkout successful!\nTotal: $" + total);

    // Reset cart
    cart = [];
    total = 0;
    updateCart();
  }
</script>

</body>
</html>
